git:
  base-branch: main
  parent-branch: main
  auto-merge: false
  require-pr-to-base: false

repo:
  short-name: "<SHORT_NAME>"
  branch-prefix: ~

pipeline:
  implementer: <IMPLEMENTER>
  discussion-review:
    rounds: 2
    default: sonnetmax
  plan-review:
    rounds: 3
    default: sonnetmax
    holistic: sonnetmax
    per-card: sonnetmax
  code-review:
    rounds: 3
    default: sonnetmax
    holistic: sonnetmax
    per-card: sonnetmax

runtime:
  pre-arm-timeout-seconds: 14400

notifications:
  slack:
    enabled: false
    webhook: ""
    channel: ""
  toast:
    enabled: true
